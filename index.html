<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Bingo Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    input {
      width: 90%;
      border: none;
      text-align: center;
      font-size: 14px;
      background: transparent;
    }

    .container {
      background: white;
      padding: 20px;
      display: inline-block;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 input {
      font-size: 32px;
      font-weight: bold;
    }

    /* 🔥 截圖區塊（包含標題 + grid） */
    #capture {
      display: inline-block;
    }

    /* 🔥 無縫 grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 100px);
      grid-template-rows: repeat(5, 100px);
      gap: 0;
      margin-top: 20px;
      border: 1px solid #333;
    }

    /* 🔥 單邊框避免變粗 */
    .cell {
      border-right: 1px solid #333;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
    }

    .cell:nth-child(5n) {
      border-right: none;
    }

    .cell:nth-last-child(-n + 5) {
      border-bottom: none;
    }

    .star {
      font-size: 40px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- ✅ 這塊會被截圖 -->
  <div id="capture">
    <h1>
      <input id="title" value="日音 BINGO">
    </h1>

    <div id="bingo" class="grid"></div>
  </div>

  <!-- ❌ 不會進圖片 -->
  <button onclick="downloadImage()">下載圖片</button>
</div>

<script>
  const grid = document.getElementById("bingo");

  for (let i = 0; i < 25; i++) {
    const div = document.createElement("div");
    div.className = "cell";

    if (i === 12) {
      div.innerHTML = "<div class='star'>★</div>";
    } else {
      const input = document.createElement("input");
      input.placeholder = "輸入";
      div.appendChild(input);
    }

    grid.appendChild(div);
  }

  function downloadImage() {
    html2canvas(document.querySelector("#capture"), {
      scale: 2,
      useCORS: true
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = "bingo.png";
      link.href = canvas.toDataURL();
      link.click();
    });
  }
</script>

</body>
</html>
