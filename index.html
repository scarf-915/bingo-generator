<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Bingo Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      display: inline-block;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    /* 🔥 截圖區塊（加留白） */
    #capture {
      display: inline-block;
      padding: 30px;         /* ⭐ 留白 */
      background: white;     /* ⭐ 避免透明 */
    }

    .title-text {
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 100px);
      grid-template-rows: repeat(5, 100px);
      gap: 0;
      margin-top: 20px;
      border: 1px solid #333;
    }

    .cell {
      position: relative;
      border-right: 1px solid #333;
      border-bottom: 1px solid #333;
      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell:nth-child(5n) {
      border-right: none;
    }

    .cell:nth-last-child(-n + 5) {
      border-bottom: none;
    }

    .text {
      width: 90%;
      height: 90%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      word-break: break-word;
      overflow-wrap: break-word;
      line-height: 1.2;
      font-size: 24px;
    }

    .cell input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      color: transparent;
      caret-color: black;
      text-align: center;
      font-size: 24px;
    }

    .star {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>
<body>

<div class="container">

  <div id="capture">
    <div class="title-text" id="titleDisplay">日音 BINGO</div>
    <div id="bingo" class="grid"></div>
  </div>

  <button onclick="downloadImage()">下載圖片</button>
</div>

<script>
  const grid = document.getElementById("bingo");

  for (let i = 0; i < 25; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    if (i === 12) {
      const star = document.createElement("div");
      star.className = "star";
      star.textContent = "★";
      cell.appendChild(star);
    } else {
      const text = document.createElement("div");
      text.className = "text";

      const input = document.createElement("input");
      input.placeholder = "輸入";

      input.addEventListener("input", () => {
        text.textContent = input.value;
        autoResize(text);
      });

      cell.appendChild(text);
      cell.appendChild(input);
    }

    grid.appendChild(cell);
  }

  function autoResize(el) {
    let size = 24;
    el.style.fontSize = size + "px";

    while (
      (el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth)
      && size > 10
    ) {
      size--;
      el.style.fontSize = size + "px";
    }
  }

  const titleDisplay = document.getElementById("titleDisplay");

  titleDisplay.addEventListener("click", () => {
    const text = prompt("輸入標題", titleDisplay.textContent);
    if (text !== null) {
      titleDisplay.textContent = text;
    }
  });

  function downloadImage() {
    html2canvas(document.querySelector("#capture"), {
      scale: 2,
      useCORS: true
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = "bingo.png";
      link.href = canvas.toDataURL();
      link.click();
    });
  }
</script>

</body>
</html>
